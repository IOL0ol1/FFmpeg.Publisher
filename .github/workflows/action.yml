# This is a basic workflow to help you get started with Actions

name: Publisher

# Controls when the workflow will run
on:

  # 1:00 everyday
  schedule:
    - cron: '00 1 * * *'
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  actions: write
  id-token: write
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Setup NuGet.exe for use with actions
        # You may pin to the exact commit or the version.
        # uses: NuGet/setup-nuget@296fd3ccf8528660c91106efefe2364482f86d6f
        uses: NuGet/setup-nuget@v1.2.0
        with:
          # NuGet version to install. Can be `latest`, `preview`, a concrete version like `5.3.1`, or a semver range specifier like `5.x`.
          nuget-version: latest
        
      # Runs a set of commands using the runners shell
      - name: Pack & Push GPL nuget
        shell: pwsh
        run: |
            cd Build
            powershell ./GPL.ps1

      # Exchanges the GitHub OIDC token for a short-lived nuget.org API key (Trusted Publishing)
      - name: NuGet Login
        uses: NuGet/login@v1
        id: nuget-login-gpl
        with:
          user: IOL0ol1

      - name: NuGet push
        shell: pwsh
        run: |
            nuget push "FFmpeg/ffmpeg-master-latest-win64-gpl-shared/*.nupkg" -Source https://api.nuget.org/v3/index.json -ApiKey "${{ steps.nuget-login-gpl.outputs.NUGET_API_KEY }}"
          
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: ffmpeg-gpl
          # A file, directory or wildcard pattern that describes what to upload
          path: FFmpeg/ffmpeg-master-latest-win64-gpl-shared/*.nupkg

      # Runs a set of commands using the runners shell
      - name: Pack & Push LGPL nuget
        shell: pwsh
        run: |
            cd Build
            powershell ./LGPL.ps1

      # Exchanges the GitHub OIDC token for a short-lived nuget.org API key (Trusted Publishing)
      - name: NuGet Login
        uses: NuGet/login@v1
        id: nuget-login-lgpl
        with:
          user: IOL0ol1

      - name: NuGet push
        shell: pwsh
        run: |
            nuget push "FFmpeg/ffmpeg-master-latest-win64-lgpl-shared/*.nupkg" -Source https://api.nuget.org/v3/index.json -ApiKey "${{ steps.nuget-login-lgpl.outputs.NUGET_API_KEY }}"
          
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: ffmpeg-lgpl
          # A file, directory or wildcard pattern that describes what to upload
          path: FFmpeg/ffmpeg-master-latest-win64-lgpl-shared/*.nupkg

      
      - name: Action Archiver
        # You may pin to the exact commit or the version.
        # uses: sibiraj-s/action-archiver@2f343a7eece20fe27cb9d3a8012d2c74b3030d79
        uses: sibiraj-s/action-archiver@v1.1.2
        with:
          # A File or directory or glob pattern to archive
          path: FFmpeg/**/*.nupkg
 
          


          

    
              
